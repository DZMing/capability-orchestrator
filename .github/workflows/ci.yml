name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Unit tests
        run: node --test tests/scan.test.cjs tests/skill-contract.test.cjs
      - name: Install smoke test
        run: bash tests/install.test.sh
      - name: Install idempotency test
        run: bash tests/install-idempotent.test.sh
