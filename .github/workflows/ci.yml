name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Syntax check
        run: node --check scripts/*.cjs scripts/lib/*.cjs
      - name: Release metadata report
        run: npm run verify:release
      - name: Unit tests
        run: npm test
      - name: Coverage (Node 22 only)
        if: matrix.node-version == 22 && matrix.os == 'ubuntu-latest'
        run: node --test --experimental-test-coverage tests/scan.test.cjs tests/route-matcher.test.cjs tests/route-logger.test.cjs tests/live-verify.test.cjs tests/release-readiness-check.test.cjs tests/fuzz.test.cjs tests/stress.test.cjs tests/integration.test.cjs tests/platform.test.cjs tests/skill-contract.test.cjs
      - name: Install smoke test
        run: bash tests/install.test.sh
      - name: Install idempotency test
        run: bash tests/install-idempotent.test.sh

  windows-compat:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        shell: bash
        run: node --check scripts/*.cjs scripts/lib/*.cjs
      - name: Release metadata report
        run: npm run verify:release
      - name: Unit tests
        run: npm test
      - name: Windows install smoke test
        shell: pwsh
        run: ./tests/install.windows.ps1
